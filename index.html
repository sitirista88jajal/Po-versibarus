<body>

<header>

<h1>PRE ORDER KAOS HAUL KE-28</h1>

<!-- GALERI FOTO -->

<section class="galeri">

<div class="slide">

<img id="fotoProduk" src="images/kaos-hitam.png" alt="Kaos Haul">

</div>

</section>


<!-- FORM -->

<section class="info">

<h2>Form Pemesanan</h2>

<form id="formPesanan">

<label>Nama Lengkap</label>
<input type="text" id="nama" required>

<label>Nomor WhatsApp</label>
<input type="tel" id="wa" required>

<label>Warna</label>
<select id="warna">
<option>Hitam</option>
<option>Putih</option>
</select>

<label>Model</label>
<select id="model">
<option>Lengan Pendek</option>
<option>Lengan Panjang</option>
</select>

<label>Ukuran</label>
<select id="ukuran">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>
</select>

<label>Jumlah</label>
<input type="number" id="jumlah" value="1" min="1">

<h2 id="harga">Rp115.000</h2>

<button type="button" onclick="kirimWA()">

Pesan via WhatsApp

</button>

</form>

</section>


<section class="info">

<h2>Spesifikasi</h2>

<ul>

<li>✔ Cotton Combed 24s Premium</li>
