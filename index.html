<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PO Kaos Haul</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h1>PRE ORDER KAOS HAUL</h1>
<p>Abah Sepuh Sukamandi Al-Mu'awanah</p>
</header>

<section class="banner">
<h2>Silakan Isi Form Pemesanan</h2>
<p>Isi data dengan benar.</p>
</section>

<section class="info">

<form id="formPesanan">

<label>Nama Lengkap</label>
<input type="text" id="nama" required>

<label>Nomor WhatsApp</label>
<input type="tel" id="wa" required>

<label>Ukuran</label>
<select id="ukuran">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
<option>XXL</option>
<option>3XL</option>
</select>

<label>Warna</label>
<select id="warna">
<option>Hitam</option>
<option>Putih</option>
</select>

<label>Jumlah</label>
<input type="number" id="jumlah" value="1">

<button type="button" onclick="kirimWA()">
Pesan Sekarang
</button>

</form>

</section>

<footer>
©2026 PO Kaos Haul
</footer>

<script src="js/script.js"></script>

</body>
</html>
